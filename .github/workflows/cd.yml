name: Backend CD

on:
  workflow_run:
    workflows:
      - Backend CI
    types:
      - completed

concurrency:
  group: backend-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf "%s" "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.EC2_HOST }}
          SSH_PORT: ${{ secrets.EC2_PORT }}
          SSH_USER: ${{ secrets.EC2_USERNAME }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" <<EOF
          set -e

          cd "${DEPLOY_PATH}"

          if [ ! -f ".env.prod" ]; then
            echo ".env.prod file not found in deploy path"
            exit 1
          fi

          git fetch origin main
          git checkout main
          git pull origin main

          if docker compose version >/dev/null 2>&1; then
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
            docker compose --env-file .env.prod -f docker-compose.prod.yml ps
          elif command -v docker-compose >/dev/null 2>&1; then
            docker-compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
            docker-compose --env-file .env.prod -f docker-compose.prod.yml ps
          else
            echo "docker compose or docker-compose is required on the server"
            exit 1
          fi

          echo "Waiting for app to start (max 3 min)..."
          for i in $(seq 1 18); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null; then
              echo "App is healthy"
              break
            fi
            if [ "$i" -eq 18 ]; then
              echo "App failed to start within 3 minutes"
              docker compose --env-file .env.prod -f docker-compose.prod.yml logs app --tail=50 2>/dev/null || \
                docker-compose --env-file .env.prod -f docker-compose.prod.yml logs app --tail=50 2>/dev/null
              exit 1
            fi
            echo "Attempt $i/18, retrying in 10s..."
            sleep 10
          done
          curl -f http://localhost:8080/actuator/health
          EOF
