spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/mercenary?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

jwt:
  secret: ${JWT_SECRET:mercenary_high_project_secret_key_for_jwt_2025_fighting}

kakao:
  client-id: ${KAKAO_CLIENT_ID:7d14f9ab2e737ea77a60f2c1bffce860}
  redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:5173/login/callback}

auth:
  dev-login-enabled: ${AUTH_DEV_LOGIN_ENABLED:true}
