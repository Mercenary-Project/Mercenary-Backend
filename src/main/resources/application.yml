spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    time-zone: ${APP_TIMEZONE:Asia/Seoul}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET}

kakao:
  client-id: ${KAKAO_CLIENT_ID}
  redirect-uri: ${KAKAO_REDIRECT_URI}

auth:
  dev-login-enabled: ${AUTH_DEV_LOGIN_ENABLED:false}

app:
  timezone: ${APP_TIMEZONE:Asia/Seoul}
  match:
    cleanup-cron: ${APP_MATCH_CLEANUP_CRON:0 */10 * * * *}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
