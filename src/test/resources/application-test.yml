spring:
  datasource:
    url: jdbc:h2:mem:mercenary-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
        show_sql: false
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: test-jwt-secret-key-with-enough-length-1234567890

kakao:
  client-id: test-kakao-client-id
  redirect-uri: http://localhost:5173/login/callback

auth:
  dev-login-enabled: true
