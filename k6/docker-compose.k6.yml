services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    image: mercenary-backend:k6-test
    restart: "no"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:mysql://mysql:3306/mercenary_test?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&createDatabaseIfNotExist=true
      DB_USERNAME: root
      DB_PASSWORD: testpass123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: k6-test-secret-key-that-is-long-enough-for-hmac-sha256
      KAKAO_CLIENT_ID: dummy-kakao-client-id
      KAKAO_REDIRECT_URI: http://localhost:5173/login/callback
      APP_CORS_ALLOWED_ORIGINS: "*"
      AUTH_DEV_LOGIN_ENABLED: "true"
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1" ]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 30s

  mysql:
    image: mysql:8.0
    restart: "no"
    environment:
      MYSQL_DATABASE: mercenary_test
      MYSQL_ROOT_PASSWORD: testpass123
    ports:
      - "3308:3306"
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -u root -p\"$$MYSQL_ROOT_PASSWORD\"" ]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: "no"
    ports:
      - "6380:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 10

  k6-influxdb:
    image: influxdb:1.8
    restart: "no"
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"

  grafana:
    image: grafana/grafana:10.2.2
    restart: "no"
    ports:
      - "3000:3000"
    depends_on:
      - k6-influxdb
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning